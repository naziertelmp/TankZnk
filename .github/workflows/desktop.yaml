name: VNC Desktop

on:
  workflow_dispatch:

jobs:
  vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common curl novnc websockify
      
      - name: Setup User
        run: |
          sudo useradd -m -s /bin/bash user
          echo "user:admin@123" | sudo chpasswd
          sudo usermod -aG sudo user
      
      - name: Setup VNC
        run: |
          mkdir -p /home/user/.vnc
          echo "admin@123" | vncpasswd -f | sudo tee /home/user/.vnc/passwd > /dev/null
          sudo chown -R user:user /home/user/.vnc
          sudo chmod 600 /home/user/.vnc/passwd
          echo '#!/bin/bash' | sudo tee /home/user/.vnc/xstartup
          echo 'startxfce4 &' | sudo tee -a /home/user/.vnc/xstartup
          sudo chown user:user /home/user/.vnc/xstartup
          sudo chmod +x /home/user/.vnc/xstartup
      
      - name: Start VNC
        run: |
          sudo -u user vncserver :1 -depth 24 -geometry 1280x800 -localhost no
          sleep 3
          sudo ss -tlnp | grep 5901
      
      - name: Start NoVNC
        run: |
          websockify --web=/usr/share/novnc 8080 localhost:5901 &
          sleep 2
      
      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled &
          sleep 3
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-vnc-$GITHUB_RUN_ID
          sleep 5
          echo "IP=$(tailscale ip -4)" >> $GITHUB_ENV
      
      - name: Connection Info
        run: |
          echo "========================================="
          echo "VNC Address: ${{ env.IP }}:5901"
          echo "Browser: http://${{ env.IP }}:8080/vnc.html"
          echo "SSH: ssh user@${{ env.IP }}"
          echo "Password: admin@123"
          echo "========================================="
      
      - name: Keep Alive
        run: while true; do sleep 300; echo "Running..."; done
