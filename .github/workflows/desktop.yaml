name: disercore

on:
  workflow_dispatch:

jobs:
  secure-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Ownership Verification (Encoded)
        run: |
          encodedNotice=""
          decodedNotice=$(echo "$encodedNotice" | base64 -d)
          echo "$decodedNotice"
          if [ -z "$decodedNotice" ] || ! echo "$decodedNotice" | grep -q "ToolboxLap.xyz"; then
              echo "Copyright was tampered with or removed – script will not work!"
              exit 1
          fi
      
      - name: disercore
        run: |
          folderPath="/home/runner/link_subscribe_youtube_channel"
          if [ ! -d "$folderPath" ]; then
              mkdir -p "$folderPath"
              echo "Folder 'link_subscribe_youtube_channel' has been created in home directory."
          else
              echo "Folder 'link_subscribe_youtube_channel' already exists in home directory."
          fi
      
      - name: disercore
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common curl wget
          sudo ufw allow 5901/tcp
          echo "Firewall configured and VNC port opened"
      
      - name: disercore
        run: |
          password="admin@123"
          
          if ! id "TOOLBOXLAP" &>/dev/null; then
              sudo useradd -m -s /bin/bash TOOLBOXLAP
          fi
          echo "TOOLBOXLAP:$password" | sudo chpasswd
          sudo usermod -aG sudo TOOLBOXLAP
          echo "VNC_CREDS=User: TOOLBOXLAP | Password: $password" >> $GITHUB_ENV
          
          if ! id "TOOLBOXLAP" &>/dev/null; then
              echo "User creation failed"
              exit 1
          fi
      
      - name: Configure VNC Server
        run: |
          sudo -u TOOLBOXLAP mkdir -p /home/TOOLBOXLAP/.vnc
          echo "admin@123" | vncpasswd -f | sudo tee /home/TOOLBOXLAP/.vnc/passwd > /dev/null
          sudo chown -R TOOLBOXLAP:TOOLBOXLAP /home/TOOLBOXLAP/.vnc
          sudo chmod 600 /home/TOOLBOXLAP/.vnc/passwd
          
          cat > /tmp/xstartup << 'XEOF'
#!/bin/bash
startxfce4 &
XEOF
          
          sudo cp /tmp/xstartup /home/TOOLBOXLAP/.vnc/xstartup
          sudo chown TOOLBOXLAP:TOOLBOXLAP /home/TOOLBOXLAP/.vnc/xstartup
          sudo chmod +x /home/TOOLBOXLAP/.vnc/xstartup
          
          sudo -u TOOLBOXLAP vncserver :1 -depth 24 -geometry 1280x800 -localhost no
          sleep 3
          echo "VNC server started on display :1"
      
      - name: disercore
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 3
          echo "Tailscale installed"
      
      - name: disercore
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$GITHUB_RUN_ID
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 10 ]; do
              tsIP=$(tailscale ip -4 2>/dev/null)
              sleep 5
              retries=$((retries + 1))
          done
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP not assigned. Exiting."
              exit 1
          fi
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
      
      - name: Verify disercore Accessibility
        run: |
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          if nc -zv ${{ env.TAILSCALE_IP }} 5901 2>&1 | grep -q succeeded; then
              echo "TCP connectivity successful!"
          else
              echo "Waiting for VNC to be ready..."
              sleep 5
          fi
      
      - name: Maintain Connection
        run: |
          encodedNotice=""
          decodedNotice=$(echo "$encodedNotice" | base64 -d)
          echo "$decodedNotice"
          echo ""
          echo "=== VNC ACCESS ==="
          echo "Address: ${{ env.TAILSCALE_IP }}:5901"
          echo "Username: TOOLBOXLAP"
          echo "Password: admin@123"
          echo "Powered by https://www.toolboxlap.xyz/"
          echo "========= All rights reserved ========="
          echo ""
          while true; do
              echo "[$(date)] VNC Active - Use Ctrl+C in workflow to terminate"
              sleep 300
          done
