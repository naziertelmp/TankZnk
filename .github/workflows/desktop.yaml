name: Desktop

on:
  workflow_dispatch:

jobs:
  vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Update
        run: sudo apt-get update
      - name: Install
        run: sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common curl
      - name: User
        run: |
          sudo useradd -m -s /bin/bash user
          echo "user:admin@123" | sudo chpasswd
          sudo usermod -aG sudo user
      - name: VNC Setup
        run: |
          sudo -u user mkdir -p /home/user/.vnc
          echo "admin@123" | vncpasswd -f | sudo tee /home/user/.vnc/passwd > /dev/null
          sudo chown user:user /home/user/.vnc/passwd
          sudo chmod 600 /home/user/.vnc/passwd
          printf '#!/bin/bash\nstartxfce4 &\n' | sudo tee /home/user/.vnc/xstartup > /dev/null
          sudo chown user:user /home/user/.vnc/xstartup
          sudo chmod +x /home/user/.vnc/xstartup
          sudo -u user vncserver :1 -depth 24 -geometry 1280x800 -localhost no &
          sleep 3
      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled &
          sleep 3
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-vnc-$GITHUB_RUN_ID
          sleep 5
          echo "IP=$(tailscale ip -4)" >> $GITHUB_ENV
      - name: Info
        run: |
          echo "VNC: ${{ env.IP }}:5901"
          echo "SSH: ssh user@${{ env.IP }}"
          echo "Pass: admin@123"
      - name: Keep
        run: while true; do sleep 300; done
