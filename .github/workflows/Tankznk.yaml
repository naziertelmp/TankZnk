name: TankZnk

on:
  workflow_dispatch:

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget git
          sudo useradd -m -s /bin/bash coreterm
          echo "coreterm:admin@123" | sudo chpasswd
          sudo usermod -aG sudo coreterm
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 3
      - name: Connect
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-terminal-$GITHUB_RUN_ID
          sleep 5
          echo "IP=$(tailscale ip -4)" >> $GITHUB_ENV
      - name: Show Info
        run: |
          echo "ssh coreterm@${{ env.IP }}"
          echo "Password: admin@123"
      - name: Keep Alive
        run: |
          while true; do
            sleep 300
            echo "Running..."
          done
